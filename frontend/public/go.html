<!doctype html>
<html>
<head><meta charset="utf-8"><title>BioDize</title></head>
<body>
<script>
  // Sets API base from ?api= query param, then redirects to the app.
  // Example: go.html?api=http://localhost:8000
  var api = new URLSearchParams(location.search).get('api');
  if (api) localStorage.setItem('biodize_api_base', api);
  location.replace('/BioDize/');
</script>
</body>
</html>
