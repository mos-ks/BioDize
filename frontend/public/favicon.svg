<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bd" x1="0.62" y1="0" x2="0.28" y2="1">
      <stop offset="0" stop-color="#141043" />
      <stop offset="0.5" stop-color="#3a3670" />
      <stop offset="1" stop-color="#c8c6e0" />
    </linearGradient>
    <!-- carves the lower-left of the capsule into dissolving pixels -->
    <mask id="diss">
      <rect width="32" height="32" fill="#fff" />
      <rect x="9.4" y="21.4" width="3" height="3" rx="0.6" fill="#000" />
      <rect x="10.6" y="24.6" width="2.3" height="2.3" rx="0.5" fill="#000" />
      <rect x="12.4" y="21" width="2" height="2" rx="0.4" fill="#000" />
    </mask>
  </defs>
  <!-- capsule body, lower-left carved into pixels -->
  <rect x="9" y="3" width="19" height="26" rx="9.5" fill="url(#bd)" mask="url(#diss)" />
  <!-- top-left detached pixel (the notch) -->
  <rect x="4.3" y="3.4" width="4.3" height="4.3" rx="1" fill="url(#bd)" />
  <!-- dissolve drifting off the lower-left -->
  <rect x="5.2" y="23.4" width="2.6" height="2.6" rx="0.5" fill="url(#bd)" />
  <rect x="3.2" y="27.3" width="1.9" height="1.9" rx="0.4" fill="url(#bd)" />
  <rect x="8.4" y="27.7" width="1.8" height="1.8" rx="0.4" fill="url(#bd)" />
</svg>
