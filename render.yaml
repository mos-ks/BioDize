# One-click deploy to Render (https://render.com). Push, then "New + Blueprint".
# No GPU needed — all models are remote APIs. Set the secret keys in the dashboard.
services:
  - type: web
    name: biodize-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: EXTRACTOR
        value: openai
      - key: OCR_ENGINE
        value: mistral
      - key: PIPELINE_WORKERS
        value: "4"            # small instances: fewer concurrent model reads so the first
                              # burst doesn't drop pages (and the cover identity read) under
                              # memory/connection pressure on a 512MB box
      - key: RENDER_DPI
        value: "150"          # lighter page renders -> less memory on a 512MB instance
      - key: OPENAI_MODEL
        value: gpt-5.5          # exact vision model id (override in the dashboard if it changes)
      - key: OPENAI_API_KEY
        sync: false             # set in dashboard
      - key: MISTRAL_API_KEY
        sync: false             # set in dashboard
      - key: DATABASE_URL
        value: sqlite:///./biodize.db   # local SQLite (ephemeral, fine per session);
                                        # set a Supabase Postgres URL here for persistence
