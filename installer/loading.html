<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioDize</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --accent-a: #6366f1;
      --accent-b: #38bdf8;
      --green:    #34d399;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'Segoe UI', 'Inter', system-ui, sans-serif;
      color: var(--text);
      -webkit-app-region: drag;
      user-select: none;
      gap: 0;
    }

    /* ── Logo ────────────────────────────────────────────────────────────── */
    .logo-wrap {
      width: 96px;
      height: 96px;
      margin-bottom: 28px;
      filter: drop-shadow(0 0 20px rgba(99,102,241,0.35));
      animation: float 3.2s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px);  }
      50%       { transform: translateY(-9px); }
    }

    /* ── Wordmark ─────────────────────────────────────────────────────────── */
    .wordmark {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-a) 0%, var(--accent-b) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 52px;
    }

    /* ── Progress bar ─────────────────────────────────────────────────────── */
    .bar-track {
      width: 260px;
      height: 2px;
      background: var(--surface);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 22px;
      position: relative;
    }
    .bar-fill {
      position: absolute;
      inset: 0;
      width: 0;
      background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
      border-radius: 99px;
      animation: load 4.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes load {
      0%   { width: 0%;   }
      20%  { width: 38%;  }
      45%  { width: 62%;  }
      70%  { width: 78%;  }
      88%  { width: 88%;  }
      100% { width: 93%;  }
    }

    /* Shimmer overlay on the bar */
    .bar-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
      animation: shine 1.8s ease-in-out infinite;
      border-radius: 99px;
    }
    @keyframes shine {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(260px);  }
    }

    /* ── Status text ──────────────────────────────────────────────────────── */
    .status {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      height: 16px;
      transition: opacity 0.25s ease;
    }

    /* ── Version badge ────────────────────────────────────────────────────── */
    .version-badge {
      position: fixed;
      bottom: 20px;
      right: 24px;
      font-size: 11px;
      color: var(--border);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <!-- Actual BioDize logo icon -->
  <div class="logo-wrap">
    <img src="build/icon.png" width="96" height="96"
         style="border-radius: 20px; display: block;"
         alt="BioDize" />
  </div>

  <div class="wordmark">BioDize</div>
  <div class="tagline">Pharma Batch Intelligence</div>

  <div class="bar-track">
    <div class="bar-fill"></div>
    <div class="bar-shine"></div>
  </div>

  <div class="status" id="status">Initialising...</div>

  <div class="version-badge" id="ver"></div>

  <script>
    const msgs = [
      'Initialising...',
      'Starting backend service...',
      'Loading data models...',
      'Preparing database...',
      'Connecting API...',
      'Almost ready...',
    ];
    let idx = 0;
    const el = document.getElementById('status');

    function step() {
      idx = (idx + 1) % msgs.length;
      el.style.opacity = '0';
      setTimeout(() => {
        el.textContent = msgs[idx];
        el.style.opacity = '1';
      }, 130);
    }
    step(); // show first real message immediately
    setInterval(step, 1500);

    // Show version when Electron exposes it
    if (window.biodize) {
      window.biodize.version().then(v => {
        document.getElementById('ver').textContent = 'v' + v;
      }).catch(() => {});
    }
  </script>
</body>
</html>
